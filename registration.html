<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Login Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Container */
.flip-container{
    perspective:1000px;
}

.card{
    width:800px;
    height:450px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.8s;
}

.card.flipped{
    transform:rotateY(180deg);
}

/* Common panels */
.panel{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    backface-visibility:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* LEFT INFO PANEL */
.info{
    width:40%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.info h1{
    margin-bottom:15px;
}

.info p{
    font-size:14px;
    line-height:1.6;
}

.info button{
    margin-top:25px;
    background:transparent;
    border:1px solid white;
    color:white;
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
}

/* FORM PANEL */
.form{
    width:60%;
    padding:35px;
}

.form h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:12px;
}

.input-group label{
    display:block;
    font-size:14px;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:9px;
    border-radius:5px;
    border:1px solid #ccc;
}

.form button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#667eea;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

/* Register back side */
.register{
    transform:rotateY(180deg);
}
</style>

</head>
<body>

<div class="flip-container">
    <div class="card" id="card">

        <!-- LOGIN SIDE -->
        <div class="panel login">
            <div class="info">
                <h1>Welcome Back!</h1>
                <p>Login to continue your journey with us.</p>
                <button onclick="flip()">New user? Register</button>
            </div>

            <div class="form">
                <h2>Login</h2>
                <form>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" required>
                    </div>

                    <button type="submit">Login</button>
                </form>
            </div>
        </div>

        <!-- REGISTER SIDE -->
        <div class="panel register">
            <div class="info">
                <h1>Hello Friend!</h1>
                <p>Create an account and start your journey.</p>
                <button onclick="flip()">Already have account?</button>
            </div>

            <div class="form">
                <h2>Register</h2>
                <form>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" required>
                    </div>

                    <button type="submit">Register</button>
                </form>
            </div>
        </div>

    </div>
</div>

<script>
function flip(){
    document.getElementById("card").classList.toggle("flipped");
}
</script>

</body>
</html>
