<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:#fff;
    padding:30px;
    width:360px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.input-group{
    margin-bottom:15px;
}
.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}
.input-group input{
    width:100%;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
}
.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}
button{
    width:100%;
    padding:10px;
    background:#667eea;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#5a67d8;
}
.text{
    text-align:center;
    margin-top:15px;
}
a{
    color:#667eea;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="button" onclick="window.location.href='registration.html'">
    Sign In
</button>


        <div class="text">
            Don’t have an account? <a href="registration.html">Register</a>
        </div>
    </form>
</div>

</body>
</html>
